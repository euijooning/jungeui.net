services:
  # 백엔드 API
  api:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: ${PROJECT_NAME}_api
    restart: always
    env_file: .env
    environment:
      API_PORT: ${API_PORT:-1217}
    expose:
      - "${API_PORT:-1217}"
    networks:
      - ejlab_global_net

  # 🌟 앱 내부 전용 꼬마 Nginx (React 정적 서빙)
  nginx:
    image: nginx:alpine
    container_name: ${PROJECT_NAME}_nginx
    restart: always
    environment:
      API_PORT: ${API_PORT:-1217}
      # Compose 에서 $$ → 컨테이너에는 ^API_PORT$ ($host 등 오치환 방지)
      NGINX_ENVSUBST_FILTER: '^API_PORT$$'
    expose:
      - "80" # 외부 포트 개방 없음!
    volumes:
      - ./nginx/templates:/etc/nginx/templates:ro
      - ./apps/client/dist:/var/www/client
      - ./apps/backoffice/dist:/var/www/admin
      - ./uploads:/var/www/uploads
    networks:
      - ejlab_global_net

networks:
  ejlab_global_net:
    external: true